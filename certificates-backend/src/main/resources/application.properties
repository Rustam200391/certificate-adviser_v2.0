# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/certificates_db
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Use "validate" in production (schema managed by schema.sql).
# Switch to "create-drop" during local development to auto-create tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql on startup (creates tables if they don't exist)
spring.sql.init.mode=always

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
